<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#2d5a27"/>
<title>주렁주렁 경주점 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --green-dark:#1a3d1c;
  --green:#2d6a30;
  --green-mid:#4a8c3f;
  --green-light:#7ab648;
  --green-bg:#edf7e5;
  --green-text:#2d6a30;
  --brown:#7c5c3a;
  --cream:#faf7f2;
  --warm:#f5efe6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#faf6ef;}
.header{background:rgba(15,30,16,0.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:white;padding:16px 16px 14px;position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:10px;}
.header-icon{font-size:28px;line-height:1;}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.5px;}
.header p{font-size:11px;opacity:.7;margin-top:2px;}
.header-wave{height:16px;background:var(--green-dark);position:relative;margin-top:-1px;z-index:99;}
.header-wave::after{content:'';position:absolute;bottom:0;left:0;right:0;height:16px;background:var(--cream);border-radius:50% 50% 0 0/100% 100% 0 0;}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:2px solid var(--green-bg);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;color:#c0c0c0;font-size:10px;gap:2px;border:none;background:none;}
.tab.on{color:var(--green);}
.tab-label{font-weight:700;}
.content{padding:0 0 80px;min-height:100vh;background:transparent;}
.sec{display:none;}.sec.vis{display:block;}
.today-banner{background:rgba(26,61,28,0.92);color:white;margin:14px 14px 0;border-radius:18px;padding:16px 18px;position:relative;overflow:hidden;}
.today-banner::before{content:'🌿';position:absolute;right:14px;top:8px;font-size:52px;opacity:.15;}
.today-banner::after{content:'🍃';position:absolute;right:55px;bottom:4px;font-size:34px;opacity:.1;}
.today-banner .label{font-size:11px;opacity:.8;margin-bottom:5px;letter-spacing:.3px;}
.today-banner .next{font-size:16px;font-weight:700;}
.today-banner .loc{font-size:12px;opacity:.85;margin-top:4px;line-height:1.5;}
.sched-group{margin:16px 14px;}
.sg-title{font-size:13px;font-weight:700;color:var(--brown);margin-bottom:10px;padding-left:10px;border-left:3px solid var(--green-light);}
.scard{background:white;border-radius:16px;margin-bottom:9px;padding:13px 15px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(45,106,48,.07);cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.scard-time{font-size:14px;font-weight:700;color:var(--green);min-width:44px;background:var(--green-bg);padding:7px 4px;border-radius:10px;text-align:center;line-height:1.3;}
.scard-body{flex:1;}
.scard-animal{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.scard-loc{font-size:12px;color:#aaa;}
.scard-wk{font-size:10px;padding:2px 8px;border-radius:8px;background:#fef3e2;color:#b35c00;display:inline-block;margin-bottom:4px;font-weight:600;}
.scard-arr{font-size:16px;color:#ddd;}
.scard.done{opacity:.3;background:#f9f9f9;}
.scard.now{border:1.5px solid var(--green-mid);background:#f7fbf4;box-shadow:0 4px 14px rgba(45,106,48,.13);}
.scard.soon{border:1.5px solid #e07b2a;background:#fff9f5;box-shadow:0 4px 14px rgba(224,123,42,.1);}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;display:inline-block;margin-bottom:5px;}
.badge-now{background:var(--green);color:white;}
.badge-soon{background:#e07b2a;color:white;}
.countdown{font-size:12px;font-weight:700;margin-top:3px;}
.countdown-now{color:var(--green);}
.countdown-soon{color:#e07b2a;}
.today-banner .countdown-txt{font-size:13px;opacity:.9;margin-top:4px;}
.today-banner .countdown-num{font-size:22px;font-weight:700;margin-top:2px;letter-spacing:1px;}
.map-wrap{margin:14px;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,0.11);overflow:hidden;}
.map-container{position:relative;display:inline-block;width:100%;}
.map-img{width:100%;display:block;}
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;display:flex;flex-direction:column;align-items:center;z-index:10;}
.pin:active{transform:translate(-50%,-100%) scale(1.15);}
.pin-dot{width:36px;height:36px;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 12px rgba(0,0,0,0.35);}
.pin-stem{width:3px;height:8px;background:rgba(0,0,0,0.3);}
.pin-lbl{font-size:10px;font-weight:700;color:#111;background:rgba(255,255,255,0.97);padding:3px 8px;border-radius:8px;margin-top:3px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.map-legend{display:flex;flex-wrap:wrap;gap:6px;margin:10px 14px 6px;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#444;background:rgba(255,255,255,0.9);padding:5px 10px;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.leg-c{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.map-hint{font-size:11px;color:#c0c0c0;text-align:center;margin:6px 0 12px;}
.animal-section{margin:14px;}
.as-title{font-size:13px;font-weight:700;color:var(--brown);margin-bottom:10px;padding-left:10px;border-left:3px solid var(--green-light);}
.animal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.acard{background:white;border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);cursor:pointer;border:1.5px solid transparent;}
.acard:active{transform:scale(.95);}
.acard.prog-card{border-color:#d6edc8;}
.aem{font-size:32px;display:block;margin-bottom:6px;}
.aimg{width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 8px;border:2px solid #e8f0e2;}
.aimg-err{width:72px;height:72px;border-radius:50%;background:#edf7e5;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 8px;}
.akr{font-size:13px;font-weight:700;color:#1a1a1a;}
.aen{font-size:9px;color:#ccc;margin-top:1px;}
.aprog{font-size:10px;color:var(--green-mid);margin-top:5px;font-weight:700;background:var(--green-bg);padding:3px 7px;border-radius:7px;display:inline-block;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;}
.sheet-overlay.open{display:flex;}
.sheet{background:#faf7f2;border-radius:24px 24px 0 0;width:100%;padding:0 0 env(safe-area-inset-bottom);max-height:88vh;overflow-y:auto;}
.sh{width:40px;height:4px;background:#e0ddd8;border-radius:2px;margin:14px auto 18px;}
.sb{padding:0 22px 32px;}
.st{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.se{font-size:44px;line-height:1;background:var(--green-bg);width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sn h2{font-size:20px;font-weight:700;color:#111;}
.sn p{font-size:13px;color:#bbb;margin-top:3px;}
.sr{display:flex;gap:8px;margin-bottom:11px;}
.sl{color:#ccc;min-width:52px;flex-shrink:0;font-size:13px;padding-top:1px;}
.sv{color:#222;line-height:1.6;font-size:13px;}
.stags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
.stag{font-size:12px;padding:5px 11px;border-radius:10px;background:var(--green-bg);color:var(--green-text);font-weight:500;}
.szone{font-size:12px;padding:6px 13px;border-radius:10px;margin-top:12px;display:inline-block;font-weight:600;}
.sprog{background:#fdf9f2;border:1.5px solid #ead9b0;border-radius:16px;padding:14px 16px;margin-top:18px;}
.spt{font-size:12px;color:#c4994a;margin-bottom:10px;font-weight:700;letter-spacing:.3px;}
.spi{font-size:14px;font-weight:600;color:#333;padding:6px 0;border-bottom:1px solid #f0ebe0;display:flex;justify-content:space-between;align-items:center;}
.spi:last-child{border:none;}
.spit{font-size:13px;color:#bbb;font-weight:400;}
.wkb{font-size:10px;background:#fef3e2;color:#b35c00;padding:2px 7px;border-radius:6px;margin-left:5px;font-weight:600;}
</style>
</head>

<div class="header">
  <div class="header-inner">
    <span class="header-icon">🌿</span>
    <div>
      <h1 data-ko="주렁주렁 경주점" data-en="Jurung Jurung Gyeongju">주렁주렁 경주점</h1>
      <p data-ko="교감 프로그램 &amp; 동물 정보 가이드" data-en="Animal Interaction &amp; Guide">교감 프로그램 &amp; 동물 정보 가이드</p>

  </div>
</div>
<div class="header-wave"></div>

/* ── 탭 전환 ── */
function ST(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('vis'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));

/* ── 언어 전환 ── */
function toggleLang(){
  curLang=curLang==='ko'?'en':'ko';
  document.getElementById('langBtn').textContent=curLang==='ko'?'EN':'KO';
  buildSched();
  updateNext();
  buildAnimals();
  // data-ko/en 속성 요소들
  document.querySelectorAll('[data-ko]').forEach(el=>{
    el.innerHTML=curLang==='ko'?el.dataset.ko:el.dataset.en;
  });
}

/* ── 상태 계산 ── */
function getStatus(t){
  const now=new Date();const cur=now.getHours()*60+now.getMinutes();
  const[h,m]=t.split(':').map(Number);const tm=h*60+m;
  if(cur>=tm&&cur<tm+5) return 'now';
  if(cur>=tm-5&&cur<tm) return 'soon';
  if(cur>=tm+5) return 'done';
  return 'future';
}
function getCountdown(t){
  const now=new Date();const cur=now.getHours()*60+now.getMinutes();
  const[h,m]=t.split(':').map(Number);const diff=(h*60+m)-cur;
  if(diff>0&&diff<=5) return diff+T('minBefore');
  return null;
}

/* ── 시간표 ── */
function buildSched(){
  const list=document.getElementById('schedList');
  list.innerHTML='';
  const titleEl=document.getElementById('schedTitle');
  if(titleEl) titleEl.textContent=T('schedTitle');
  SD.forEach(s=>{
    const status=getStatus(s.t);
    const div=document.createElement('div');
    div.className='scard '+status;
    div.onclick=()=>openSheet(s.a);
    let badgeHtml='',cdHtml='';
    if(status==='now') badgeHtml=`<span class="badge badge-now">${T('badgeNow')}</span><br>`;
    if(status==='soon'){
      badgeHtml=`<span class="badge badge-soon">${T('badgeSoon')}</span><br>`;
      const cd=getCountdown(s.t);
      if(cd) cdHtml=`<div class="countdown countdown-soon">${cd}</div>`;
    }
    const ei=SD_EN[s.a]||{};
    const dProg=curLang==='en'?(ei.prog||s.prog):s.prog;
    const dLoc=curLang==='en'?(ei.loc||s.loc):s.loc;
    const dName=curLang==='en'?(AD[s.a]?AD[s.a].en:s.a):s.a;
    const wkHtml=s.wk?`<span class="scard-wk">${T('wkLabel')}</span><br>`:'';
    div.innerHTML=`
      <div class="scard-time" style="${status==='done'?'color:#bbb':''}">${s.t}</div>
      <div class="scard-body">${wkHtml}${badgeHtml}
        <div class="scard-animal">${AD[s.a]?AD[s.a].em+' ':''}${dName} ${dProg}</div>
        <div class="scard-loc">${dLoc}</div>${cdHtml}
      </div>
      <div class="scard-arr">${status==='done'?T('done'):T('future')}</div>`;
    list.appendChild(div);
  });
}

/* ── 배너 ── */
function updateNext(){
  const now=new Date();const cur=now.getHours()*60+now.getMinutes();
  const ongoing=SD.find(s=>{const[h,m]=s.t.split(':').map(Number);const t=h*60+m;return cur>=t&&cur<t+5;});
  const next=SD.find(s=>{const[h,m]=s.t.split(':').map(Number);return h*60+m>cur;});
  const progEl=document.getElementById('nextProg');
  const locEl=document.getElementById('nextLoc');
  const banner=document.querySelector('.today-banner');
  const lbl=document.querySelector('.today-banner .label');
  if(lbl) lbl.textContent=T('bannerLabel');
  if(ongoing){
    banner.style.background='#1a6b2a';
    const ei=SD_EN[ongoing.a]||{};
    const dName=curLang==='en'?(AD[ongoing.a]?AD[ongoing.a].en:ongoing.a):ongoing.a;
    const dProg=curLang==='en'?(ei.prog||ongoing.prog):ongoing.prog;
    const dLoc=curLang==='en'?(ei.loc||ongoing.loc):ongoing.loc;
    progEl.innerHTML=T('ongoingLabel');
    locEl.innerHTML=`${AD[ongoing.a]?AD[ongoing.a].em:''} ${dName} ${dProg}<br><span style="opacity:.8;font-size:12px">${dLoc}</span>`;
  } else if(next){
    const[h,m]=next.t.split(':').map(Number);
    const diff=(h*60+m)-cur;
    banner.style.background='';
    const ei=SD_EN[next.a]||{};
    const dName=curLang==='en'?(AD[next.a]?AD[next.a].en:next.a):next.a;
    const dProg=curLang==='en'?(ei.prog||next.prog):next.prog;
    const dLoc=curLang==='en'?(ei.loc||next.loc):next.loc;
    progEl.textContent=`${next.t} · ${dName} ${dProg}`;
    locEl.innerHTML=`${dLoc}${diff<=5?`<br><span style="font-size:12px;font-weight:700;opacity:1">⏱ ${diff}${T('minStart')}</span>`:''}`;
  } else {
    banner.style.background='#888';
    progEl.textContent=T('endMsg');
    locEl.textContent=T('endSub');
  }
}

/* ── 동물 소개 ── */
function buildAnimals(){
  const grids={
    prog:'progGrid',fantasy:'grid-fantasy',birds:'grid-birds',
    valley:'grid-valley',jungle:'grid-jungle',vine:'grid-vine',
  };
  const secMap={
    prog:'secProg',fantasy:'secFantasy',birds:'secBirds',
    valley:'secValley',jungle:'secJungle',vine:'secVine',
  };
  Object.values(grids).forEach(id=>{const g=document.getElementById(id);if(g)g.innerHTML='';});
  Object.entries(secMap).forEach(([grp,langKey])=>{
    const g=document.getElementById(grids[grp]);
    if(g){const t=g.previousElementSibling;if(t&&t.classList.contains('as-title'))t.textContent=T(langKey);}
  });
  Object.entries(AD).forEach(([name,d])=>{
    const g=document.getElementById(grids[d.group]);if(!g)return;
    const c=document.createElement('div');
    c.className='acard'+(d.prog?' prog-card':'');
    const dN=curLang==='en'?d.en:name;
    const dS=curLang==='en'?name:d.en;
    if(d.img){
      const im=document.createElement('img');
      im.className='aimg'; im.src=d.img; im.alt=name; im.loading='lazy';
      const fb=document.createElement('div');
      fb.className='aimg-err'; fb.textContent=d.em; fb.style.display='none';
      im.onerror=()=>{im.style.display='none';fb.style.display='flex';};
      c.appendChild(im); c.appendChild(fb);
    } else {
      const fb=document.createElement('div');
      fb.className='aimg-err'; fb.textContent=d.em; c.appendChild(fb);
    }
    const info=document.createElement('div');
    info.innerHTML=`<div class="akr">${dN}</div><div class="aen">${dS}</div>${d.prog?`<div class="aprog">${T('progBadge')}</div>`:''}`;
    c.appendChild(info);
    c.onclick=()=>openSheet(name);
    g.appendChild(c);
  });
}

    <div class="sr"><span class="sl">${T('sheetHab')}</span><span class="sv">${d.hab}</span></div>
    <div class="sr"><span class="sl">${T('sheetFood')}</span><span class="sv">${d.food}</span></div>
    <div class="sr"><span class="sl">${T('sheetFeat')}</span><span class="sv">${d.feat}</span></div>
    <div class="stags">${d.tags.map(t=>`<span class="stag">${t}</span>`).join('')}</div>
    <span class="szone" style="background:${d.zonec}22;color:${d.zonec}">📍 ${d.zone}</span>
    ${progs.length?`<div class="sprog">
      <div class="spt">${T('sheetProgTitle')}</div>
      ${progs.map(p=>{
        const ei=SD_EN[p.a]||{};
        const dP=curLang==='en'?(ei.prog||p.prog):p.prog;
        return `<div class="spi"><span>${dP}${p.wk?`<span class="wkb">${T('wkLabel')}</span>`:''}</span><span class="spit">${p.t}</span></div>`;
      }).join('')}
    </div>`:''}`;
  document.getElementById('overlay').classList.add('open');
  if(d.img){
    const si=document.getElementById('sheet-img-'+name);
    if(si) si.onerror=()=>{si.outerHTML=`<span class="se">${d.em}</span>`;};
  }
}
function closeSheet(e){if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');}

/* ── 지도 핀 ── */
function placePins(){
  const mc=document.getElementById('mc');
  const img=document.getElementById('mapImg');
  mc.querySelectorAll('.pin').forEach(p=>p.remove());
  const iw=img.offsetWidth,ih=img.offsetHeight;
  if(!iw||!ih)return;
  PINS.forEach(pin=>{
    const el=document.createElement('div');el.className='pin';
    el.style.left=(pin.x/100*iw)+'px';el.style.top=(pin.y/100*ih)+'px';
    const lbl=curLang==='en'?pin.en:pin.name;
    el.innerHTML=`<div class="pin-dot" style="background:${pin.color}">${pin.em}</div><div class="pin-stem"></div><div class="pin-lbl">${lbl}</div>`;
    el.onclick=e=>{e.stopPropagation();openSheet(pin.name);};
    mc.appendChild(el);
  });
}

/* ── 초기화 ── */
buildSched();
updateNext();
buildAnimals();
setInterval(()=>{buildSched();updateNext();},30000);
const mapImg=document.getElementById('mapImg');
if(mapImg.complete)placePins();else mapImg.onload=placePins;
window.addEventListener('resize',placePins);
</script>
</body>
</html>
